<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <link rel="stylesheet" href="index.css">
        <link rel="stylesheet" href="sideber.css">
        <title>練習なのさっ！</title>
    </head>
    <body>
        <div class="header-content">
            <a>&lt;</a>
            <a>　&gt;　</a>
            <input type="text" class="kennsaku" placeholder="検索(Ctrl + F)">
        </div>

        <article>
            
            <div class="content">

                <div class="sideber">
                    <p></p>
                </div>


                <div class="content-sideber">
                    <!-- サイドバー部分のヘッダー-->
                    <div class="sideber-header">
                        <h5>チャット</h5>
                        <div class="sideber-icon">
                            <span><button>…</button></span>
                            <span><button>🔎</button></span>
                            <span><button>□</button></span>
                        </div>
                    </div>

                    <!-- サイドバーのタブ部分 -->
                    <div class="sideber-tabs">
                        <button>未読</button>&nbsp;
                        <button>チャネル</button>&nbsp;
                        <button>チャット</button>&nbsp;
                        <button>会議チャット</button>
                    </div>

                    <details>
                        <summary>チャット</summary>
                        <ul class="chat-list">
                            <li>
                                <a>河村 聖夜</a>
                            </li>
                            <li>
                                <a>情報 太郎</a>
                            </li>
                            <li>
                                <a>情報 花子</a>
                            </li>
                            <li>
                                <a>株式 太郎</a>
                            </li>
                        </ul>
                    </details>
                    <details>
                        <summary>チャネル</summary>
                        <ul class="channel-list">
                            <li>
                                <a>全体共有</a>
                            </li>
                            <li>
                                <a>ショートトレーニング</a>
                            </li>
                            <li>
                                <a>課題</a>
                            </li>
                        </ul>
                    </details>
                </div>

                <div class="content-main">
                </div>
            </div>
        </article>
        
        <script src="chatDisplay.js"></script>
    </body>
</html>
